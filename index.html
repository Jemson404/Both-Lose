<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Both-Lose</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #131314;
    --text: #c9c5be;
    --text-dim: #5a5750;
    --text-dimmer: #302e2b;
    --accent: #c9c5be;
    --chippy: #4a473f;
    --chippy-speak: #7a7568;
    --option-border: #2a2825;
    --option-hover: #1c1b19;
    --option-selected: #201f1d;
    --option-selected-border: #5a5750;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ---- SCREENS ---- */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    padding: 2rem;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ---- LANDING ---- */
  #landing-screen {
    gap: 3rem;
  }
  .landing-title {
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    color: var(--text);
    line-height: 1;
  }
  .landing-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .begin-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.9rem 2.4rem;
    border: 1px solid var(--text-dimmer);
    transition: color 0.4s ease, border-color 0.4s ease;
    margin-top: 1rem;
  }
  .begin-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  /* ---- QUESTION ---- */
  #question-screen {
    gap: 0;
    max-width: 640px;
    width: 100%;
  }
  .question-text {
    font-size: clamp(1.25rem, 3.5vw, 1.75rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 3rem;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .question-text.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    width: 100%;
    opacity: 0;
    transition: opacity 0.5s ease 0.25s;
  }
  .options.visible { opacity: 1; }

  .option-btn {
    background: none;
    border: 1px solid var(--option-border);
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 300;
    padding: 1rem 1.4rem;
    text-align: left;
    cursor: pointer;
    transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    line-height: 1.45;
    letter-spacing: 0.01em;
  }
  .option-btn:hover {
    background: var(--option-hover);
    border-color: var(--text-dimmer);
    color: var(--text);
  }
  .option-btn.selected {
    background: var(--option-selected);
    border-color: var(--option-selected-border);
    color: var(--text);
  }

  .submit-area {
    margin-top: 2.2rem;
    display: flex;
    justify-content: flex-end;
    width: 100%;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .submit-area.visible { opacity: 1; }

  .submit-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    cursor: pointer;
    transition: color 0.3s ease;
    padding: 0.4rem 0;
  }
  .submit-btn:hover { color: var(--text-dim); }
  .submit-btn.ready { color: var(--text-dim); }

  /* ---- OUTRO ---- */
  #outro-screen {
    max-width: 560px;
    width: 100%;
    gap: 0;
    justify-content: center;
  }

  /* single-line stage */
  #outro-stage {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 4rem;
    position: relative;
  }
  #outro-stage-line {
    font-size: clamp(1rem, 2.8vw, 1.4rem);
    font-weight: 300;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 0.6s ease;
    position: absolute;
    width: 100%;
    padding: 0 1rem;
  }
  #outro-stage-line.em { font-style: italic; }
  #outro-stage-line.strong {
    font-weight: 400;
    font-size: clamp(1.1rem, 3vw, 1.55rem);
  }
  #outro-stage-line.visible { opacity: 1; }

  /* post-sequence recap — appears only after full sequence ends */
  #outro-recap {
    width: 100%;
    max-height: 60vh;
    overflow-y: auto;
    opacity: 0;
    transition: opacity 1.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.1rem;
    padding: 0 1rem;
    scrollbar-width: none;
  }
  #outro-recap::-webkit-scrollbar { display: none; }
  #outro-recap.visible { opacity: 1; }
  .recap-line {
    font-size: clamp(0.88rem, 2.2vw, 1.08rem);
    font-weight: 300;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.75;
    padding: 0.05rem 0;
  }
  .recap-line.em { font-style: italic; }
  .recap-line.strong { font-weight: 400; color: var(--text); }
  .recap-line.gap { height: 0.6rem; }

  /* ---- CHIPPY ---- */
  #chippy {
    position: fixed;
    bottom: 2rem;
    bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
    left: 2rem;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    pointer-events: none;
  }

  #chippy-bubble {
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.64rem;
    color: var(--chippy-speak);
    letter-spacing: 0.05em;
    max-width: 180px;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.25s ease;
    padding-left: 0.2rem;
  }
  #chippy-bubble.visible { opacity: 1; }

  #chippy-body {
    width: 28px;
    height: 22px;
    position: relative;
  }
  #chippy-blob {
    width: 100%;
    height: 100%;
    background: var(--chippy);
    border-radius: 50% 45% 55% 40% / 45% 55% 45% 55%;
    animation: blob-breathe 3.8s ease-in-out infinite;
  }
  @keyframes blob-breathe {
    0%, 100% { border-radius: 50% 45% 55% 40% / 45% 55% 45% 55%; transform: scale(1); }
    33% { border-radius: 45% 55% 40% 55% / 55% 40% 55% 45%; transform: scale(1.04, 0.97); }
    66% { border-radius: 55% 40% 50% 45% / 40% 55% 50% 55%; transform: scale(0.97, 1.03); }
  }

  /* ---- HP COUNTER ---- */
  #hp-counter {
    position: fixed;
    top: 1.5rem;
    top: calc(1.5rem + env(safe-area-inset-top, 0px));
    right: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    color: #4a8c5c;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 50;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    line-height: 1;
  }
  #hp-counter.visible { opacity: 1; }

  #hp-value {
    display: block;
    transition: color 0.4s ease;
  }
  #hp-value.shake {
    animation: hp-shake 0.38s ease forwards;
  }
  @keyframes hp-shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-3px); }
    45%  { transform: translateX(3px); }
    65%  { transform: translateX(-2px); }
    82%  { transform: translateX(1px); }
    100% { transform: translateX(0); }
  }

  .hp-drop {
    position: absolute;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: #b84a4a;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    animation: hp-fall 1.6s ease-out forwards;
  }
  @keyframes hp-fall {
    0%   { opacity: 0.9; transform: translateY(0) translateX(0); }
    20%  { opacity: 0.95; }
    100% { opacity: 0; transform: translateY(32px) translateX(4px); }
  }

  .hp-rise {
    position: absolute;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: #4a8c5c;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    animation: hp-float 1.6s ease-out forwards;
  }
  @keyframes hp-float {
    0%   { opacity: 0.9; transform: translateY(0) translateX(0); }
    20%  { opacity: 0.95; }
    100% { opacity: 0; transform: translateY(-28px) translateX(-3px); }
  }

  #question-screen.q-shake {
    animation: q-shake 0.42s ease forwards;
  }
  @keyframes q-shake {
    0%   { transform: translateX(0); }
    18%  { transform: translateX(-4px); }
    40%  { transform: translateX(3px); }
    62%  { transform: translateX(-2px); }
    80%  { transform: translateX(1px); }
    100% { transform: translateX(0); }
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 200;
    opacity: 0.6;
  }
  /* ---- EXIT BUTTON ---- */
  #exit-btn {
    display: none;
    margin-top: 3rem;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    cursor: pointer;
    padding: 0.4rem 0;
    opacity: 0;
    transition: opacity 0.8s ease, color 0.3s ease;
    align-self: center;
  }
  #exit-btn.visible {
    opacity: 1;
  }
  #exit-btn:hover { color: var(--text-dim); }

  /* ---- CHIPPY FALLBACK STAGES ---- */
  /* Stage 0 = normal (no class). Stages applied to #chippy element. */
  #chippy.fallback-1 {
    transform: scale(1.55);
    transform-origin: bottom left;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #chippy.fallback-1 #chippy-bubble {
    font-size: 0.76rem;
    max-width: 210px;
    color: var(--text-dim);
  }

  #chippy.fallback-2 {
    transform: scale(2.4);
    transform-origin: bottom left;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #chippy.fallback-2 #chippy-bubble {
    font-size: 0.82rem;
    max-width: 240px;
    color: var(--text-dim);
  }

  #chippy.fallback-3 {
    transform: scale(3.8);
    transform-origin: bottom left;
    transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #chippy.fallback-3 #chippy-bubble {
    font-size: 0.88rem;
    max-width: 260px;
    color: var(--text);
  }

  /* dim background content behind Chippy during fallback */
  #app.chippy-fallback-active .screen.active {
    transition: opacity 0.6s ease;
    opacity: 0.25;
  }

  /* ---- CENTERING & RESPONSIVE POLISH ---- */
  /* Ensure screens truly center their content horizontally at all sizes */
  .screen {
    left: 0;
    right: 0;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
  }

  /* Question and outro containers: centered as units on wider viewports */
  #question-screen {
    align-items: center;
  }
  #question-screen > *,
  #outro-screen > * {
    margin-left: auto;
    margin-right: auto;
  }

  /* Options block: left-aligned text inside, but block itself is centered */
  #options-container {
    align-self: center;
  }

  /* Submit row stays right-aligned within the centered block */
  #submit-area {
    align-self: center;
  }

  /* Larger screens: tighten max-width so content feels optically centered */
  @media (min-width: 768px) {
    #question-screen {
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    #outro-screen {
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    #outro-stage {
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  }

  /* Mobile: give screens a bit more horizontal breathing room */
  @media (max-width: 480px) {
    .screen {
      padding: 1.5rem 1.25rem;
    }
    #outro-stage-line {
      padding: 0 0.5rem;
    }
  }

</style>
</head>
<body>
<div id="app">

  <!-- LANDING -->
  <div id="landing-screen" class="screen active">
    <div style="display:flex;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;">
      <h1 class="landing-title">both-lose</h1>
      <p class="landing-sub">a short experience</p>
      <button class="begin-btn" id="begin-btn">Begin</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="question-screen" class="screen">
    <p class="question-text" id="question-text"></p>
    <div class="options" id="options-container"></div>
    <div class="submit-area" id="submit-area">
      <button class="submit-btn" id="submit-btn">continue</button>
    </div>
  </div>

  <!-- OUTRO -->
  <div id="outro-screen" class="screen">
    <div id="outro-stage">
      <div id="outro-stage-line"></div>
    </div>
    <div id="outro-recap"></div>
    <button id="exit-btn">I'll go back to my game</button>
  </div>

  <!-- CHIPPY -->
  <div id="chippy">
    <div id="chippy-bubble"></div>
    <div id="chippy-body"><div id="chippy-blob"></div></div>
  </div>
  <!-- HP COUNTER -->
  <div id="hp-counter"><span id="hp-value">100</span></div>

</div>

<script>
// ---- DATA ----
const ALL_QUESTIONS = [
  {id:1,q:"You're about to choose—but pause for a second longer than needed. What holds it?",opts:["The feeling something isn't right","The sense another option might be better","The need to not choose too early"],intensity:1},
  {id:2,q:"Two answers both make sense. One is clean, one is layered. Where do you lean?",opts:["Clean—if it works, it's enough","Layered—things aren't that simple","The one you could defend out loud"],intensity:2},
  {id:3,q:"You move forward without full clarity. What carries the decision?",opts:["A pattern that feels familiar","A structure that seems consistent","A direction that feels settled enough"],intensity:2},
  {id:4,q:"Something sounds right—but slightly off. What breaks first?",opts:["The idea itself","Your trust in it","Your confidence in judging it"],intensity:3},
  {id:5,q:"A decision is made quickly—and the tension drops. What changed?",opts:["The choice locked in","The uncertainty reduced","The process ended"],intensity:2},
  {id:6,q:"You delay choosing—even though you could decide now. What keeps it open?",opts:["The outcome still feels unclear","The reasoning doesn't feel complete","The moment doesn't feel final"],intensity:3},
  {id:7,q:"You get another chance—this time knowing what happens. What actually shifts?",opts:["The decision itself","The reasoning behind it","The sense of control over it"],intensity:4},
  {id:8,q:"It works—but not the way you expected. What do you trust?",opts:["The result","The path that led there","The idea it could fail next time"],intensity:4},
  {id:9,q:"A conclusion feels solid—but you can't fully break it down. What supports it?",opts:["Experience forming quickly","Consistency on the surface","Nothing clearly contradicting it"],intensity:3},
  {id:10,q:"Two options still stand—and neither stands out. What creates the tension?",opts:["Choosing one removes the other","There's no clear difference","Both could hold up"],intensity:5},
  {id:11,q:"Right after choosing, a reason forms. What does it do?",opts:["Strengthens the choice","Explains it after the fact","Completes what was missing"],intensity:4},
  {id:12,q:"You follow a clear line of thinking—but something still doesn't sit right. Why?",opts:["The logic might be missing something","The feeling doesn't match the outcome","You expected more certainty"],intensity:5},
  {id:13,q:"A safer option is taken—even though a stronger one was there. What defines that?",opts:["Risk was reduced","Potential shifted","A tradeoff was made"],intensity:5},
  {id:14,q:"Just before finalizing, something changes your pick. What triggered it?",opts:["A last-second realization","A shift in confidence","The urge to avoid regret"],intensity:6},
  {id:15,q:"A position feels strong—until it needs to be explained. What changes?",opts:["Its structure gets tested","Its clarity weakens","Its gaps show up"],intensity:6},
  {id:16,q:"Others reach the same conclusion after you do. What does that affect?",opts:["How strong it feels","How confident it seems","How correct it appears"],intensity:5},
  {id:17,q:"Midway through choosing, something feels familiar. What does that point to?",opts:["A pattern aligning","A pattern repeating","A pattern being assumed"],intensity:6},
  {id:18,q:"You keep thinking—but the answer doesn't get clearer. What's happening?",opts:["The process keeps expanding","The choice stays the same","The limit has been reached"],intensity:7},
  {id:19,q:"Right after choosing, another option stands out. What does that show?",opts:["Other paths were always there","The choice narrowed too early","The result changed how it looks"],intensity:7},
  {id:20,q:"It ends—but doesn't feel fully settled. What defines that state?",opts:["Something wasn't clear","Nothing confirmed it","It finished without closure"],intensity:8},
  {id:21,q:"You move on without knowing if it was right or wrong. What remains?",opts:["The decision itself","The reasoning behind it","The absence of an answer"],intensity:9},
];

const OUTRO_LINES = [
  {text:"Did it ever feel fully clear?", cls:""},
  {text:"", cls:"pause-line"},
  {text:"It wasn't meant to.", cls:"em"},
  {text:"", cls:"pause-line"},
  {text:"Every option was designed to feel right.", cls:""},
  {text:"And still take something from you.", cls:""},
  {text:"", cls:"pause-line"},
  {text:"You paused.", cls:""},
  {text:"You moved quickly.", cls:""},
  {text:"You shifted direction.", cls:""},
  {text:"Some stayed longer than others.", cls:""},
  {text:"", cls:"pause-line"},
  {text:"The outcome was never the point.", cls:"em"},

  {text:"It was always going to end.", cls:""},

  {text:"", cls:"pause-line"},

const CHIPPY_LINES = {
  landing: [
    "you dont need to know my name, maybe just answer those questions what you came here for---",
    "yeah alright. go on then.",

// ---- STATE ----
let sessionQuestions = [];
let currentQIdx = 0;
let selectedOpt = null;
let answerTimestamps = [];
let questionStartTime = 0;

// Chippy state
let chippyLastSpokenAt = 0;
let chippyRecentLines = [];
let chippyIsSpeaking = false;
let chippyCooldown = 3500;
let waitingTimer = null;
let chippyQuestionSpeakCount = 0;

// ---- QUESTION SELECTION ----
function selectQuestions() {
  const shuffled = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, 8);
  picked.sort((a, b) => a.intensity - b.intensity);
  return picked;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---- CHIPPY ----
function chippyCanSpeak() {
  const now = Date.now();
  return !chippyIsSpeaking && (now - chippyLastSpokenAt) > chippyCooldown;
}

function pickLine(pools) {
  const allCandidates = pools.flat().filter(l => !chippyRecentLines.includes(l));
  if (!allCandidates.length) return pools.flat()[Math.floor(Math.random() * pools.flat().length)];
  return allCandidates[Math.floor(Math.random() * allCandidates.length)];
}

function chippySpeak(line) {
  if (!line) return;
  chippyIsSpeaking = true;
  chippyLastSpokenAt = Date.now();
  chippyRecentLines = [...chippyRecentLines.slice(-4), line];
  chippyQuestionSpeakCount++;

  const bubble = document.getElementById('chippy-bubble');
  bubble.textContent = line;
  bubble.classList.add('visible');

  const holdMs = 1200 + Math.random() * 900;
  setTimeout(() => {
    bubble.classList.remove('visible');
    setTimeout(() => { chippyIsSpeaking = false; }, 300);
  }, holdMs);
}

function tryChippySpeak(trigger, signals = {}) {
  if (!chippyCanSpeak()) return;
  if (chippyQuestionSpeakCount >= 1 && Math.random() < 0.45) return; // limit per question

  const useGlobal = Math.random() < 0.5;
  let line;

  if (useGlobal) {
    const pool = Math.random() < 0.15 ? CHIPPY_LINES.selfUndermine : CHIPPY_LINES.global;
    line = pickLine([pool]);
  } else {
    let pool;
    if (trigger === 'waiting') pool = CHIPPY_LINES.waiting;
    else if (trigger === 'selected') pool = CHIPPY_LINES.selected;
    else if (trigger === 'submit') pool = CHIPPY_LINES.submit;
    else pool = CHIPPY_LINES.global;
    line = pickLine([pool]);
  }

  chippySpeak(line);
}

function armWaitingTimer() {
  clearTimeout(waitingTimer);
  const delay = 2200 + Math.random() * 2000;
  waitingTimer = setTimeout(() => {
    tryChippySpeak('waiting');
  }, delay);
}

function clearWaitingTimer() {
  clearTimeout(waitingTimer);
}

// ---- TRANSITIONS ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- QUESTION FLOW ----
function renderQuestion(idx) {
  selectedOpt = null;
  chippyQuestionSpeakCount = 0;
  const q = sessionQuestions[idx];
  const opts = shuffle(q.opts);

  const qEl = document.getElementById('question-text');
  const optsEl = document.getElementById('options-container');
  const submitArea = document.getElementById('submit-area');
  const submitBtn = document.getElementById('submit-btn');

  qEl.classList.remove('visible');
  optsEl.classList.remove('visible');
  submitArea.classList.remove('visible');
  submitBtn.classList.remove('ready');
  optsEl.innerHTML = '';

  setTimeout(() => {
    qEl.textContent = q.q;
    qEl.classList.add('visible');

    setTimeout(() => {
      opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => selectOption(btn, i, opts));
        optsEl.appendChild(btn);
      });
      optsEl.classList.add('visible');
      submitArea.classList.add('visible');

      questionStartTime = Date.now();
      armWaitingTimer();
    }, 350);
  }, 80);
}

function selectOption(btn, idx, opts) {
  clearWaitingTimer();
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOpt = idx;

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.classList.add('ready');

  tryChippySpeak('selected');
}

function submitAnswer() {
  if (selectedOpt === null) return;
  clearWaitingTimer();

  const elapsed = Date.now() - questionStartTime;
  answerTimestamps.push(elapsed);

  tryChippySpeak('submit');

  const qEl = document.getElementById('question-text');
  const optsEl = document.getElementById('options-container');
  const submitArea = document.getElementById('submit-area');

  const nextDelay = 500 + Math.random() * 400;

  qEl.classList.remove('visible');
  optsEl.style.opacity = '0';
  submitArea.style.opacity = '0';

  setTimeout(() => {
    optsEl.style.opacity = '';
    submitArea.style.opacity = '';
    currentQIdx++;
    if (currentQIdx < sessionQuestions.length) {
      renderQuestion(currentQIdx);
    } else {
      startOutro();
    }
  }, nextDelay + 400);
}

// ---- OUTRO ----
// Content-aware hold times (ms) for real text lines
function outroHoldMs(text, cls) {
  if (!text || !text.trim()) return 0; // pause beats handled separately
  const isStrong = cls && cls.includes('strong');
  const len = text.length;
  if (isStrong) return 3200 + Math.random() * 1000; // 3200–4200ms
  if (len > 35) return 2600 + Math.random() * 600;  // longer lines
  return 2200 + Math.random() * 600;                // normal lines
}

async function showOutroLine(stageEl, text, cls) {
  const fadeMs = 550 + Math.random() * 150; // 550–700ms

  // set classes and text
  stageEl.className = cls ? cls : '';
  stageEl.textContent = text;

  // fade in
  stageEl.classList.add('visible');
  await delay(fadeMs + outroHoldMs(text, cls));

  // fade out
  stageEl.classList.remove('visible');
  await delay(fadeMs);
}

async function startOutro() {
  showScreen('outro-screen');

  // Silence Chippy early in outro — only one quiet chance at the very start
  setTimeout(() => {
    if (Math.random() < 0.3 && chippyCanSpeak()) {
      const line = CHIPPY_LINES.outro[Math.floor(Math.random() * CHIPPY_LINES.outro.length)];
      chippySpeak(line);
    }
  }, 600);

  const stage = document.getElementById('outro-stage-line');
  const recap = document.getElementById('outro-recap');
  stage.className = '';
  stage.textContent = '';
  recap.innerHTML = '';

  // initial breath before first line
  await delay(900);

  // Drive each line one at a time
  for (let i = 0; i < OUTRO_LINES.length; i++) {
    const { text, cls } = OUTRO_LINES[i];
    const isPause = cls === 'pause-line';

    if (isPause) {
      // blank beat between lines — stage is already empty after fade-out
      await delay(900 + Math.random() * 500); // 900–1400ms
      continue;
    }

    // Slightly longer pause before final two real lines
    const isFinalSection = i >= OUTRO_LINES.length - 5;
    if (isFinalSection && i > 0) await delay(400);

    await showOutroLine(stage, text, cls);
  }

  // Stage stays empty after last line fades
  // Brief silence before recap surfaces
  await delay(1800);

  // Build and reveal the recap — all lines, dimmed, scrollable
  OUTRO_LINES.forEach(({ text, cls }) => {
    if (cls === 'pause-line') {
      const gap = document.createElement('div');
      gap.className = 'recap-line gap';
      recap.appendChild(gap);
      return;
    }
    const el = document.createElement('div');
    el.className = 'recap-line' + (cls ? ' ' + cls : '');
    el.textContent = text;
    recap.appendChild(el);
  });

  recap.classList.add('visible');

  // Reveal exit button after recap settles
  setTimeout(() => {
    const exitBtn = document.getElementById('exit-btn');
    exitBtn.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => exitBtn.classList.add('visible')));
  }, 1400);
}

// ---- EXIT BUTTON + CHIPPY FALLBACK (additive) ----
(function() {
  const FALLBACK_LINES = [
    "just close the tab, kid.",
    "good luck with your game.",
    "yeah, this part's on ios.",
    "blame the browser. not me.",
    "still here?",
    "you know where the close button is.",
    "guess it didn't take.",
    "awkward.",
    "try the tab thing yourself.",
    "not everything exits clean.",
    "you're gonna have to do this one.",
    "that button meant well.",
  ];

  let fallbackActive = false;
  let fallbackStage = 0;
  let lastFallbackLine = null;

  function pickFallbackLine() {
    const pool = FALLBACK_LINES.filter(l => l !== lastFallbackLine);
    const line = pool[Math.floor(Math.random() * pool.length)];
    lastFallbackLine = line;
    return line;
  }

  function enterFallbackStage() {
    fallbackStage = Math.min(fallbackStage + 1, 3);
    const chippy = document.getElementById('chippy');
    const app = document.getElementById('app');

    // Remove previous stage classes
    chippy.classList.remove('fallback-1', 'fallback-2', 'fallback-3');
    chippy.classList.add('fallback-' + fallbackStage);
    app.classList.add('chippy-fallback-active');

    // Force Chippy bubble visible immediately with fallback line
    // Bypass normal cooldown for fallback — speak directly
    const bubble = document.getElementById('chippy-bubble');
    bubble.textContent = pickFallbackLine();
    bubble.classList.add('visible');
    // Hold longer than normal — user needs to read it
    if (window._chippyFallbackTimeout) clearTimeout(window._chippyFallbackTimeout);
    window._chippyFallbackTimeout = setTimeout(() => {
      bubble.classList.remove('visible');
    }, 2800);
  }

  document.getElementById('exit-btn').addEventListener('click', function() {
    if (!fallbackActive) {
      // First attempt — try to close
      window.close();
      setTimeout(() => {
        // If we're still here, close was blocked
        if (!document.hidden) {
          fallbackActive = true;
          enterFallbackStage();
        }
      }, 320);
    } else {
      // Subsequent attempts — already in fallback, just escalate
      enterFallbackStage();
    }
  });
})();


function init() {
  sessionQuestions = selectQuestions();

  // Landing chippy
  setTimeout(() => {
    const line = CHIPPY_LINES.landing[Math.floor(Math.random() * CHIPPY_LINES.landing.length)];
    chippySpeak(line);
  }, 1800);

  document.getElementById('begin-btn').addEventListener('click', () => {
    clearTimeout(waitingTimer);
    document.getElementById('landing-screen').style.opacity = '0';
    document.getElementById('landing-screen').style.pointerEvents = 'none';
    setTimeout(() => {
      showScreen('question-screen');
      renderQuestion(0);
    }, 700);
  });

  document.getElementById('submit-btn').addEventListener('click', submitAnswer);
}


// ---- HP COUNTER (additive layer) ----
(function() {
  let hp = 100;
  const hpEl = document.getElementById('hp-counter');
  const hpVal = document.getElementById('hp-value');

  function updateDisplay() {
    hpVal.textContent = hp;
  }

  function spawnDrop(amount, isGain) {
    const el = document.createElement('span');
    el.className = isGain ? 'hp-rise' : 'hp-drop';
    el.textContent = (isGain ? '+' : '-') + Math.abs(amount);
    el.style.top = '1.4rem';
    el.style.right = '0';
    hpEl.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // Pre-generate 8 events: ~5-6 deductions (8–13), ~2-3 small gains (4–7)
  // Net always pushes down; gains are bait, not relief
  const eventQueue = (function() {
    function shuffleNoAdj(arr) {
      let result, attempts = 0;
      do {
        result = [...arr].sort(() => Math.random() - 0.5);
        attempts++;
      } while (attempts < 60 && result.some((v, i) => i > 0 && v.gain === result[i - 1].gain));
      return result;
    }

    // Build pool: 5 deductions + 3 gains (net: ~-(55-65) + ~(15-18) = still well below 33 floor)
    const deducts = [
      { gain: false, amount: 8 + Math.floor(Math.random() * 2) },   // 8–9
      { gain: false, amount: 9 + Math.floor(Math.random() * 2) },   // 9–10
      { gain: false, amount: 10 + Math.floor(Math.random() * 2) },  // 10–11
      { gain: false, amount: 10 + Math.floor(Math.random() * 2) },  // 10–11
      { gain: false, amount: 11 + Math.floor(Math.random() * 3) },  // 11–13
    ];
    const gains = [
      { gain: true, amount: 4 + Math.floor(Math.random() * 2) },    // 4–5
      { gain: true, amount: 5 + Math.floor(Math.random() * 2) },    // 5–6
      { gain: true, amount: 6 + Math.floor(Math.random() * 2) },    // 6–7
    ];

    // Pick 2 or 3 gains randomly
    const gainCount = Math.random() < 0.5 ? 2 : 3;
    const selectedGains = gains.sort(() => Math.random() - 0.5).slice(0, gainCount);
    const selectedDeducts = deducts.slice(0, 8 - gainCount);

    return shuffleNoAdj([...selectedDeducts, ...selectedGains]);
  })();
  let eventIndex = 0;

  function deduct() {
    const event = eventQueue[eventIndex % eventQueue.length];
    eventIndex++;
    const isGain = event.gain;
    const amount = event.amount;

    if (isGain) {
      hp = Math.min(100, hp + amount);
    } else {
      hp = Math.max(33, hp - amount);
      // only shake on loss
      const qScreen = document.getElementById('question-screen');
      qScreen.classList.remove('q-shake');
      void qScreen.offsetWidth;
      qScreen.classList.add('q-shake');
      qScreen.addEventListener('animationend', () => qScreen.classList.remove('q-shake'), { once: true });

      hpVal.classList.remove('shake');
      void hpVal.offsetWidth;
      hpVal.classList.add('shake');
      hpVal.addEventListener('animationend', () => hpVal.classList.remove('shake'), { once: true });
    }

    spawnDrop(amount, isGain);
    setTimeout(updateDisplay, 120);
  }

  document.getElementById('submit-btn').addEventListener('click', function() {
    if (selectedOpt === null) return;
    setTimeout(deduct, 320 + Math.random() * 280);
  });

  const origShowScreen = showScreen;
  window.showScreen = function(id) {
    origShowScreen(id);
    if (id === 'question-screen') {
      hpEl.classList.add('visible');
    } else {
      hpEl.classList.remove('visible');
    }
  };

  document.getElementById('begin-btn').addEventListener('click', function() {
    setTimeout(() => hpEl.classList.add('visible'), 700);
  });

  updateDisplay();
})();

init();
</script>
